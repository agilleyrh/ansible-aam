services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aam
      POSTGRES_USER: aam
      POSTGRES_PASSWORD: aam
    ports:
      - "5432:5432"
    volumes:
      - aam-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  aam-api:
    build:
      context: ../backend
    env_file:
      - ./env/backend.env.example
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  aam-worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./env/backend.env.example
    depends_on:
      - postgres
      - redis

  aam-scheduler:
    build:
      context: ../backend
    command: ["python", "-m", "app.scheduler"]
    env_file:
      - ./env/backend.env.example
    depends_on:
      - postgres
      - redis

  aam-ui:
    build:
      context: ../frontend
    depends_on:
      - aam-api
    ports:
      - "8080:8080"

volumes:
  aam-postgres:

